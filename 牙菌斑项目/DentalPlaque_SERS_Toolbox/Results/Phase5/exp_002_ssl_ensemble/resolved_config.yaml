experiment:
  id: exp_002_ssl_ensemble
  phase: Phase5
  parent: exp_001_ensemble
  hypothesis: Fold-local self-supervised spectral pretraining improves representations
    and corrects systematic high-confidence errors.
  change_reason: P5-01 improved OOF accuracy and calibration but retained the same
    two legacy-holdout errors.
  expected_effect:
    accuracy: increase
    calibration: stable_or_improve
    uncertainty: stable_or_improve
  decision_rule: OOF accuracy or balanced accuracy must improve without degrading
    a majority of folds.
  test_status: legacy_observed_holdout
seed: 42
paths:
  dataset_dir: Results/Phase3_QC/dataset
  results_dir: Results/Phase5/exp_002_ssl_ensemble
split:
  outer_seed: 42
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  oof_folds: 5
mcss:
  bag_size: 16
  train_bags_per_patient: 4
  train_repeats_per_patient: 8
  eval_bags_per_group: 16
  eval_groups_per_patient: 8
  sample_with_replacement: false
  max_wavenumber_shift: 2
  gaussian_noise_std: 0.01
model:
  kernel_sizes:
  - 3
  - 7
  - 15
  - 31
  base_channels: 32
  n_res_blocks: 2
  embedding_dim: 128
  attention_hidden: 64
  dropout_rate: 0.35
  group_norm_groups: 4
  log_var_min: -6.0
  log_var_max: 2.0
training:
  batch_size: 4
  epochs: 160
  learning_rate: 0.0007
  weight_decay: 0.0001
  warmup_deterministic_epochs: 12
  aleatoric_samples: 8
  variance_regularization: 0.0001
  consistency_weight: 0.05
  label_smoothing: 0.02
  early_stopping_patience: 30
  scheduler_patience: 10
  scheduler_factor: 0.5
  gradient_clip_norm: 5.0
ensemble:
  members: 5
  seed_stride: 10000
  aggregation: mean_probability
  diversity_sources:
  - initialization
  - mcss_sampling
  - augmentation
  - dropout
pretraining:
  enabled: true
  method: masked_denoising_plus_nt_xent
  epochs: 60
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  spectra_per_patient_per_epoch: 32
  max_wavenumber_shift: 2
  gaussian_noise_std: 0.02
  mask_fraction: 0.15
  mask_width_min: 8
  mask_width_max: 24
  full_reconstruction_weight: 0.1
  contrastive_weight: 0.1
  contrastive_temperature: 0.2
  projection_dim: 64
  gradient_clip_norm: 5.0
inference:
  mc_dropout_samples: 30
  aleatoric_samples: 16
calibration:
  temperature_min: 0.2
  temperature_max: 5.0
threshold:
  strategy: max_accuracy
parameter_notes:
  pretraining_scope: A separate encoder is pretrained using only the training patients
    of each OOF fold.
  spectra_per_patient_per_epoch: Equal patient contribution prevents acquisition count
    from becoming an SSL shortcut.
  masked_denoising: Forces the convolutional backbone to model local Raman peak structure
    rather than labels.
  nt_xent: Encourages stability to physically plausible noise, masking, and small
    wavenumber shifts.
  pretraining_reuse: All five members in one fold start from the same leakage-safe
    encoder; supervised randomness still differs.
  full_reconstruction_weight: Retains global spectral shape while masked loss emphasizes
    missing intervals.
  contrastive_weight: Kept secondary so reconstruction remains the dominant spectroscopy
    objective.
  test_status: The 11-patient holdout remains historical and is not used for pretraining
    or selection.
